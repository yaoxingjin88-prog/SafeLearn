server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/safelearn?useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useUnicode=true&characterEncoding=UTF-8
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  jackson:
    default-property-inclusion: non_null
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai
  sql:
    init:
      mode: always
      continue-on-error: true
      schema-locations: classpath:safelearn.sql
      encoding: UTF-8

app:
  jwt:
    secret: SafeLearnJwtSecretKey2026VeryLongAndSecureForHS256Algorithm
    expiration: 86400000
  ai:
    enabled: false
    api-url: https://api.openai.com/v1/chat/completions
    api-key: ""
    model: gpt-4o-mini
